<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}"> -->
    <script src="{{url_for('static', filename='js/app.js')}}" defer></script>
    <!-- defer는 js가 헤드에 들어갈 때, body의 내용을 모두 반영한 후에 js를 실행하도록.. 정리필요 -->
</head>
<body>
    <h2>FLASK API + Ajax(fetch) GET 방식</h2>
    <div><!-- id가 name인데, name에 대해서 label을 줄거다. "이름"이라는 label -->
        <div>
            <label for="name">이름</label>
            <input type="text" id="name" value="길동" />
        </div>
        <div>
            <label for="age">나이</label>
            <input type="number" id="age" value="23" min="1" />
        </div>
        <button id="sendBtn">GET(REST) 요청</button>
    </div>
    <div id="result"></div>
</body>
</html>
