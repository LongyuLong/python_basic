<!DOCTYPE html>
<html lang="en">길동
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        window.onload = () => 
        {
            document.querySelector("#btnSend").onclick = chkDataFunc;
            document.querySelector("#btnClear").onclick = clsDataFunc;
        }
        function chkDataFunc()
        {
            event.preventDefault();         // submit 기능 해제.
            // 아래 오류 검사 후, 이상 없으면 서버로 submit하도록 변경
            if(frm.name.value ===""|| isNaN(frm.name.value)===false) 
            // 이름이 없거나 숫자로만 구성되면(NaN=Not a Number)
            {
                frm.name.focus();           // name관련하여 오류발생하면 커서 이동
                alert("이름을 입력하세요");  // 실무에서 alert 사용 X, 대신 CSS 대화상자(메세지박스)
                return;                     
            }
            if(frm.id.value.length < 3)
            {
                frm.id.focus();                     // id관련하여 오류발생하면 커서 이동
                alert("아이디는 3자 이상 입력하세요")
            }
            // 정규 표현식 예시
            let str="123abc가나다45김 asdf1 23길동";
            console.log(str.match(/[1]/g));         // match: /[해당]/하는 값만 찾는다, /g : global
            console.log(str.match(/[0-9]/g));
            console.log(str.match(/\d/g));
            console.log(str.match(/\d+/g));            
            console.log(str.match(/\d{2}/g));       // 연속된 숫자 2개 제한
            console.log(str.match(/[가-힣]/g));     // 단일 한글 찾기
            console.log(str.match(/[가-힣]+/g));    // 연속된 한글 찾기, 1개여도 출력
            
            // 이메일 형식 검사
            email_regex = /^[a-zA-z0-9._-]+@[a-zA-z0-9._-]+\.[a-zA-Z]{2,4}$/i; // 맨끝의 i는 대소문자를 구별하지 않는다는 연산자.
            if(!frm.email.value.match(email_regex))
            {
                frm.email.focus();
                alert("email 형식에 맞게 입력하세요.(abc@mail.com)")
                return;
            }

            // 나이 형식 검사
            let age_regex = /^[0-9]{1,3}$/ // ^[?]: 첫글자는 반드시 ?여야함. {1,3} 1~3글자 허용, ~?$: 마지막도 ?여야함
            if(!frm.age.value.match(age_regex))
            {
                frm.age.focus();
                alert("나이는 숫자만 입력하세요")
                return;
            }

            // 입력 자료 오류 검사 후 에러 없으면 서버 파일 호출
            frm.action = "my.py";
            frm.method = "get";
            frm.submit();
        }
        function clsDataFunc()
        {
            document.querySelector("#name").focus(); // reset 기능 + focus 이동
        }
    </script>
</head>
<body>
    ** 개인 자료 입력 **<br>
    <!-- <form name="frm" action="서버파일명"></form> 이게 안되는 이유 정리--> 
    <form name="frm">
        <table class="table table-dark table-hover"> <!-- css 적용 -->
            <tr>
                <td>이름</td>
                <td><input type="text" name="name" id="name" placeholder="이름"></td>
            </tr>
            <tr>
                <td>아이디</td>
                <td><input type="text" name="id" id="id" placeholder="3글자 이상" value=""></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="text" name="email" id="email" value="example@example.com"></td> <!--email로 썼을 때 어떻게 바뀌는지 정리-->
            </tr>            
            <tr>
                <td>나이</td>
                <td><input type="text" name="age" id="age"></td> <!--number로 썼을 때 어떻게 바뀌는지 정리-->
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <input type="submit" id="btnSend" value="자료 전송" class="btn btn-primary">
                    <input type="reset" id="btnClear" value="자료 삭제" class="btn btn-info">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
