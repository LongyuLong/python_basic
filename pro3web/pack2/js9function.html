<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    ES6(ECMAScript6)부터는 화살표 함수라는 새로운 문법 형식으로 함수를 만들 수 있게 되었다.<br>
    화살표 함수는 => 기호를 사용하여 function 키워드를 생략한다.<br>
    함수 표현식보다 단순한 문법으로 함수 처리가 가능해진다.<br>
    형식: let 변수 = (매개변수 1, 2, ...) => {표현식} / 매개변수가 1개인 경우 소괄호를 생략할 수 있다.<br>
    <script>
        'use strict';
        
        function sum0(a,b)
        {
            return a+b;
        }
        document.write(sum0(1,2));

        let sum1 = function(a,b)
        {
            return a+b;
        }
        document.write(sum1(1,2));

        let sum2 = (a,b) => a+b;
        document.write(sum2(1,2));
        
        let sum3 = (a,b) => {return a+b};
        document.write(sum3(1,2));
        
        let double1 = n => n*2;
        document.write(`<br>결과는${double1(3)}<br>`);

        let sayHi=() =>document.write("안녕하세요<br>")
        sayHi()

        let age = 25;
        let welcome = (age<30)?() => document.write("안녕"):document.write("반가워");
        welcome()
        document.write("<br>")

        let sumFunc = (a,b) =>
        {
            let result = a + b;
            return result;
        }
        document.write(`두 수의 합은 ${sumFunc(5,6)}`)
        document.write("<br>")
    </script>
</body>
</html>
