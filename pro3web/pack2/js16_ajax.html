<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let xhr;

        window.onload = function()
        {
            document.querySelector("#btnGet").onclick = getFunc;  
            document.querySelector("#btnPost").onclick = getFunc;
        }
        
        function postFunc()
        {
            let irum = frm.name.value;
            let nai = frm.age.value;
            // alert(irum + " " + nai);

            xhr = new XMLHttpRequest(); // 서버와 Ajax 통신용 클래스
            let fname = "js.py";   // query string?
            xhr.open("POST", fname, true);                       // true: 비동기 방식, false: 동기 방식(사용X)
            xhr.onreadystatechange = function()
            {
                if(xhr.readyState === 4 && xhr.status === 200)  // 통신 상태 양호(status==200) 확인
                {
                    process1();
                }
            }
            xhr.setRequestHeader("Content-Type", "application/x-www-form-URLencoded")
            xhr.send("irum=" + irum + "&nai=" + nai); // body 영역에 포함되어 전송
        }

        function getFunc()
        {
            let irum = frm.name.value;
            let nai = frm.age.value;
            // alert(irum + " " + nai);

            xhr = new XMLHttpRequest(); // 서버와 Ajax 통신용 클래스
            let fname = "js.py?irum=" + irum + "&nai=" + nai;   // query string?
            // 임시 방편용 js.py 작성(처리 후 json을 반환한다고 가정)
            xhr.open("GET", fname, true);                       // true: 비동기 방식, false: 동기 방식(사용X)
            xhr.onreadystatechange = function()
            {
                if(xhr.readyState === 4 && xhr.status === 200)  // 통신 상태 양호(status==200) 확인
                {
                    process1();
                }
            }
            xhr.send();
        }
        
        function process1()
        {
            alert(xhr.responseText);
        }
    </script>
</head>
<body>
    <h2>
        Ajax 이해: get, post
    </h2>
    <form name="frm">
        이름: <input type="text" name="name" value="tom"><br>
        나이: <input type="text" name="age" value="33"><br>
        <input type="button" value="get 방식" id="btnGet">
        <input type="button" value="post 방식" id="btnPost">
    </form>
</body>
</html>
