<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = () =>
        {
            document.querySelector("#btn1").onclick = funcJson
            document.querySelector("#btn2").onclick = funcCsv
        }

        function funcJson()
        {
            let xhr = new XMLHttpRequest();
            xhr.open("GET", "sangpum.json", true);
            xhr.onreadystatechange = function()
            {
                if(xhr.readyState === 4 && xhr.status === 200)  // 통신 상태 양호(status==200) 확인
                {
                    let data = JSON.parse(xhr.responseText); // json 모양의 문자열을 json 객체로 변환

                    let output = "json 반환 결과<br>"
                    output += "코드&nbsp;&nbsp;&nbsp;상품명<br>"

                    for(let i=0; i < data.length; i++)
                    {
                        output += data[i].code + "&nbsp;&nbsp;&nbsp;" + data[i].sang + "<br>"
                    }
                    document.querySelector("#result").innerHTML = output;
                }
                else
                {
                    document.querySelector("#result").innerHTML = "로딩 실패: " + xhr.status;
                }
            }
            xhr.send();
        }

        function funcCsv()
        {
            let xhr = new XMLHttpRequest();
            xhr.open("GET", "sangpum.csv", true);
            xhr.onreadystatechange = function()
            {
                if(xhr.readyState === 4 && xhr.status === 200)  // 통신 상태 양호(status==200) 확인
                {
                    let text = xhr.responseText.trim();
                    let lines = text.split("\n");               // csv는 콤마, 줄바꿈으로만 이루어지기 때문에
                    let output = "CSV 반환 결과<br>";

                    for(let i=0; i < lines.length; i++)
                    {
                        if(lines[i] !== "")
                        {
                            let parts = lines[i].split(",")     // 
                            let code = parts[0].trim();
                            let sang = parts[1].trim();
                            output += "코드는 " + code + "상품명은 " + sang + "<br>";
                        }
                    }

                    document.querySelector("#result").innerHTML = output;
                }
            }
            xhr.send();
        }
    </script>
</head>
<body>
    <h3>전통 Ajax 처리</h3>
    <button id="btn1">JSON 불러오기</button>
    <button id="btn2">CSV 불러오기</button>
    <hr>
    <div id="result"></div>
</body>
</html>
